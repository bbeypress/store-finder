<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Store Finder — Live Search</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e38;
    --text: #e8e9ec;
    --muted: #9298a5;
    --accent: #5b8cff;
    --send: #3fbf7f;
    --hold: #e0a940;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header { padding: 40px 24px 8px; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 28px; margin: 0 0 8px; }
  .sub { color: var(--muted); font-size: 14px; }
  main { max-width: 960px; margin: 0 auto; padding: 0 24px 60px; }

  form.search {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin: 24px 0;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input[type="text"], .field input[type="number"] {
    background: #10131a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    width: 160px;
  }
  .field.checkbox { flex-direction: row; align-items: center; gap: 6px; }
  .field.checkbox label { font-size: 13px; color: var(--text); }
  button.submit {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button.submit:disabled { opacity: 0.6; cursor: default; }

  #status { color: var(--muted); font-size: 14px; margin-bottom: 20px; min-height: 20px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .card a.domain { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15px; word-break: break-all; }
  .card a.domain:hover { text-decoration: underline; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 10px; font-weight: 600; }
  .badge.live { background: rgba(63,191,127,0.15); color: var(--send); }
  .badge.unknown { background: rgba(224,169,64,0.15); color: var(--hold); }
  .products { margin-top: 10px; font-size: 13px; }
  .contact { margin-top: 10px; font-size: 13px; }
  .contact a { color: var(--accent); }
  .outreach {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    background: #10131a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    white-space: pre-wrap;
    max-height: 120px;
    overflow-y: auto;
  }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>🔎 Store Finder — Live Search</h1>
  <p class="sub">Search for newly-created Shopify stores in real time, using public certificate transparency logs.</p>
</header>
<main>
  <form class="search" id="searchForm">
    <div class="field">
      <label for="keyword">Keyword</label>
      <input type="text" id="keyword" placeholder="e.g. pet, shoe (optional)" />
    </div>
    <div class="field">
      <label for="limit">Max results</label>
      <input type="number" id="limit" value="15" min="1" max="50" />
    </div>
    <div class="field checkbox">
      <input type="checkbox" id="findContact" />
      <label for="findContact">Find contact email</label>
    </div>
    <div class="field checkbox">
      <input type="checkbox" id="draftOutreach" />
      <label for="draftOutreach">Draft outreach note</label>
    </div>
    <button class="submit" type="submit" id="submitBtn">Search</button>
  </form>

  <div id="status"></div>
  <div id="grid" class="grid"></div>
</main>

<script>
// Set this to your deployed Render URL once it's live, e.g.
// const API_BASE = "https://store-finder-api-xxxx.onrender.com";
const API_BASE = "REPLACE_WITH_YOUR_RENDER_URL";

const form = document.getElementById("searchForm");
const statusEl = document.getElementById("status");
const gridEl = document.getElementById("grid");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (API_BASE === "REPLACE_WITH_YOUR_RENDER_URL") {
    gridEl.innerHTML = `<div class="empty">This page isn't connected to a live backend yet.<br><br>Set <code>API_BASE</code> near the bottom of this file to your deployed Render URL.</div>`;
    return;
  }

  const keyword = document.getElementById("keyword").value.trim();
  const limit = document.getElementById("limit").value || 15;
  const findContact = document.getElementById("findContact").checked;
  const draftOutreach = document.getElementById("draftOutreach").checked;

  const params = new URLSearchParams({
    limit,
    find_contact: findContact,
    draft_outreach: draftOutreach,
  });
  if (keyword) params.set("keyword", keyword);

  submitBtn.disabled = true;
  statusEl.innerHTML = `<span class="spinner"></span>Searching — this can take up to 30 seconds…`;
  gridEl.innerHTML = "";

  try {
    const res = await fetch(`${API_BASE}/search?${params.toString()}`);
    const data = await res.json();

    if (!res.ok) {
      statusEl.textContent = "";
      gridEl.innerHTML = `<div class="empty">${data.detail || "Something went wrong. Try again in a moment."}</div>`;
      return;
    }

    if (!data.results || data.results.length === 0) {
      statusEl.textContent = "";
      gridEl.innerHTML = `<div class="empty">No stores found for that search. Try a broader or different keyword.</div>`;
      return;
    }

    statusEl.textContent = `${data.count} store${data.count === 1 ? "" : "s"} found.`;
    gridEl.innerHTML = data.results.map(store => {
      const isLive = store.status === "live";
      const products = (store.products || []).slice(0, 3).join(", ");
      const contact = store.contact_email
        ? `<div class="contact">✉️ <a href="mailto:${store.contact_email}">${store.contact_email}</a></div>`
        : (document.getElementById("findContact").checked ? `<div class="contact" style="color:var(--muted)">No public contact found</div>` : "");
      const outreach = store.outreach_draft
        ? `<div class="outreach">${store.outreach_draft.replace(/</g, "&lt;")}</div>`
        : "";
      return `
        <div class="card">
          <a class="domain" href="${store.url}" target="_blank" rel="noopener">${store.domain}</a>
          <div class="meta">Certificate issued: ${store.cert_issued || "unknown"}</div>
          <span class="badge ${isLive ? "live" : "unknown"}">${isLive ? "Live store" : "Unverified"}</span>
          ${products ? `<div class="products">Sells: ${products}</div>` : ""}
          ${contact}
          ${outreach}
        </div>
      `;
    }).join("");
  } catch (err) {
    statusEl.textContent = "";
    gridEl.innerHTML = `<div class="empty">Couldn't reach the search backend. It may be waking up from sleep (free-tier hosting) — wait 30 seconds and try again.</div>`;
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
